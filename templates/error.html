<!DOCTYPE html>
<head>
  {{if hotreload}}
  <script>
    const ws = new WebSocket("ws://127.0.0.1:4000/ws");
    ws.onopen = () => console.log("Websocket connected!");
    ws.onmessage = (event) => {
      if ( event.data == "reload" ) {
        window.location.reload();
      };
    }
    </script>
  {{endIf}}    

  <style>
    
    body {
      background-color: black;
      color: white;
      height: 100%;    
      margin:0px;
    }
    
    .error_container {
      background-color: #3c3836;
      width: fit-content;
      padding: 10px;
    }  
    
    .file {
      font-style: italic;
      font-size: smaller;
      padding: 3px;
    }
        
    .code_snippet {
      white-space: pre-wrap;
      background-color: #282828;
      color: #cec7a5;
      padding: 5px;
      padding-left: 10px;
    }
    
    .error_msg {
      font-size: smaller;
      padding: 3px;
    }
  </style>
</head>

<body>
  <div class="error_container">

    <div class="file">{{file}}</div>
      <div class="code_snippet">{{code_snippet}}</div>
    <div class="error_msg">{{error_msg}}</div>
  </div>
  
</body>
